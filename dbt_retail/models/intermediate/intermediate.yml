version: 2

models:
  - name: int_sales_enriched
    description: "Sales fact table enriched with calendar, store, product, and promotion context."
    columns:
      - name: sales_id
        tests:
          - not_null
          - unique
      - name: date_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: net_sales_revenue
        tests:
          - not_null
      - name: gross_margin
        tests:
          - not_null

  - name: int_returns_enriched
    description: "Returns fact table enriched with sales, calendar, store, and product context."
    columns:
      - name: return_id
        tests:
          - not_null
          - unique
      - name: sales_id
        tests:
          - not_null
      - name: date_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: refund_amount
        tests:
          - not_null
      - name: returned_units
        tests:
          - not_null

  - name: int_shrink_enriched
    description: "Shrink event table enriched with calendar, store, and product context."
    columns:
      - name: shrink_event_id
        tests:
          - not_null
          - unique
      - name: date_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: shrink_units
        tests:
          - not_null
      - name: estimated_shrink_value
        tests:
          - not_null
      - name: shrink_reason
        tests:
          - not_null

  - name: int_inventory_enriched
    description: "Weekly store-product inventory snapshot enriched with calendar, store, and product context."
    columns:
      - name: inventory_snapshot_id
        tests:
          - not_null
          - unique
      - name: date_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: ending_inventory_units
        tests:
          - not_null
      - name: inventory_value
        tests:
          - not_null
      - name: stockout_flag
        tests:
          - not_null
      - name: overstock_flag
        tests:
          - not_null

  - name: int_fulfillment_enriched
    description: "Shipment and purchase order table enriched with supplier, store, and product context."
    columns:
      - name: shipment_id
        tests:
          - not_null
          - unique
      - name: purchase_order_id
        tests:
          - not_null
      - name: supplier_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: delayed_flag
        tests:
          - not_null
      - name: delay_days
        tests:
          - not_null
      - name: fulfillment_status
        tests:
          - not_null