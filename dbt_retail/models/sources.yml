version: 2

sources:
  - name: raw
    database: retail_margin_resilience
    schema: raw
    description: "Raw generated retail operational data loaded into PostgreSQL."

    tables:
      - name: dim_calendar
        description: "Raw calendar dimension covering FY2023 through FY2025."
        columns:
          - name: date_id
            tests:
              - not_null
              - unique

      - name: dim_store
        description: "Raw store dimension with region, format, size, risk profile, and fulfillment capability."
        columns:
          - name: store_id
            tests:
              - not_null
              - unique

      - name: dim_product
        description: "Raw product dimension with category, pricing, cost, margin, return risk, and shrink risk."
        columns:
          - name: product_id
            tests:
              - not_null
              - unique

      - name: dim_supplier
        description: "Raw supplier dimension with lead time, reliability score, and delay risk."
        columns:
          - name: supplier_id
            tests:
              - not_null
              - unique

      - name: dim_promotion
        description: "Raw promotion dimension with promotion type, discount, category, channel, and date range."
        columns:
          - name: promotion_id
            tests:
              - not_null
              - unique

      - name: fact_sales
        description: "Raw sales transaction-line fact table."
        columns:
          - name: sales_id
            tests:
              - not_null
              - unique
          - name: date_id
            tests:
              - not_null
          - name: store_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null

      - name: fact_return
        description: "Raw returns fact table generated from sales behavior."
        columns:
          - name: return_id
            tests:
              - not_null
              - unique
          - name: sales_id
            tests:
              - not_null

      - name: fact_shrink_event
        description: "Raw shrink event fact table for theft, damage, miscount, spoilage, and related inventory loss."
        columns:
          - name: shrink_event_id
            tests:
              - not_null
              - unique

      - name: fact_purchase_order
        description: "Raw purchase order line fact table."
        columns:
          - name: po_line_id
            tests:
              - not_null
              - unique
          - name: purchase_order_id
            tests:
              - not_null

      - name: fact_shipment
        description: "Raw shipment fact table linked to delivered purchase orders."
        columns:
          - name: shipment_id
            tests:
              - not_null
              - unique
          - name: purchase_order_id
            tests:
              - not_null

      - name: fact_inventory_snapshot
        description: "Raw weekly store-product inventory snapshot table."
        columns:
          - name: inventory_snapshot_id
            tests:
              - not_null
              - unique
          - name: date_id
            tests:
              - not_null
          - name: store_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null